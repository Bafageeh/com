name: Deploy COM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COM_SSH_HOST }}
          username: ${{ secrets.COM_SSH_USER }}
          key: ${{ secrets.COM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.COM_SSH_PORT }}
          script_stop: true
          script: |
            set -e
            PROJECT_PATH="${{ secrets.COM_PROJECT_PATH }}"

            if [ -z "$PROJECT_PATH" ]; then
              echo "COM_PROJECT_PATH is missing"
              exit 1
            fi

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              echo "Repository is not initialized at $PROJECT_PATH"
              exit 1
            fi

            git config --global --add safe.directory "$PROJECT_PATH" || true
            cd "$PROJECT_PATH"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f "$PROJECT_PATH/com-api/public/index.php" ] || [ ! -f "$PROJECT_PATH/com-mobile/package.json" ]; then
              echo "Laravel API or Expo mobile app is missing; running bootstrap script"
              if [ -f "$PROJECT_PATH/scripts/bootstrap-com.sh" ]; then
                chmod +x "$PROJECT_PATH/scripts/bootstrap-com.sh"
                COM_PROJECT_PATH="$PROJECT_PATH" EXPO_PUBLIC_API_BASE_URL="${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" bash "$PROJECT_PATH/scripts/bootstrap-com.sh"
                git fetch origin main
                git reset --hard origin/main
              else
                echo "Bootstrap script not found"
              fi
            fi

            if [ -d "com-api" ]; then
              cd "$PROJECT_PATH/com-api"
              composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

              if [ ! -f .env ] && [ -f .env.example ]; then
                cp .env.example .env
              fi

              php artisan key:generate --force || true
              php artisan storage:link || true
              php artisan optimize:clear || true

              if grep -q '^DB_DATABASE=' .env 2>/dev/null; then
                php artisan migrate --force || true
              else
                echo "Skipping migrations because DB_DATABASE is not configured"
              fi

              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
            fi

            if [ -d "com-mobile" ]; then
              cd "$PROJECT_PATH/com-mobile"
              if [ -f package-lock.json ]; then
                npm ci || npm install
              else
                npm install
              fi
            fi

            cd "$PROJECT_PATH"
            if [ -f scripts/setup-com-domain.sh ]; then
              chmod +x scripts/setup-com-domain.sh
              COM_PROJECT_PATH="$PROJECT_PATH" COM_DOMAIN="com.pm.sa" COM_CPANEL_USER="pmsa" bash scripts/setup-com-domain.sh
            else
              echo "Domain setup script not found"
            fi

            chown -R pmsa:pmsa "$PROJECT_PATH" || true
