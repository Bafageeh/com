name: Deploy COM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COM_SSH_HOST }}
          username: ${{ secrets.COM_SSH_USER }}
          key: ${{ secrets.COM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.COM_SSH_PORT }}
          script_stop: true
          script: |
            set -e
            PROJECT_PATH="${{ secrets.COM_PROJECT_PATH }}"

            if [ -z "$PROJECT_PATH" ]; then
              echo "COM_PROJECT_PATH is missing"
              exit 1
            fi

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              echo "Repository is not initialized at $PROJECT_PATH"
              exit 1
            fi

            git config --global --add safe.directory "$PROJECT_PATH" || true
            cd "$PROJECT_PATH"
            git fetch origin main
            git reset --hard origin/main

            if [ -d "com-api" ]; then
              cd "$PROJECT_PATH/com-api"
              composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

              if [ ! -f .env ] && [ -f .env.example ]; then
                cp .env.example .env
              fi

              php artisan key:generate --force || true
              php artisan storage:link || true
              php artisan optimize:clear || true

              if grep -q '^DB_DATABASE=' .env 2>/dev/null; then
                php artisan migrate --force || true
              else
                echo "Skipping migrations because DB_DATABASE is not configured"
              fi

              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
            fi

            if [ -d "com-mobile" ]; then
              cd "$PROJECT_PATH/com-mobile"
              if [ -f package-lock.json ]; then
                npm ci || npm install
              else
                npm install
              fi
            fi

            chown -R pmsa:pmsa "$PROJECT_PATH" || true

            echo "Running cPanel AutoSSL for user pmsa"
            if [ -x /usr/local/cpanel/bin/autossl_check ]; then
              /usr/local/cpanel/bin/autossl_check --user pmsa || true
            else
              echo "AutoSSL command not found"
            fi

            echo "Checking HTTPS for com.pm.sa"
            curl -I --max-time 20 https://com.pm.sa || true
