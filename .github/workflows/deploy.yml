name: Deploy COM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COM_SSH_HOST }}
          username: ${{ secrets.COM_SSH_USER }}
          key: ${{ secrets.COM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.COM_SSH_PORT }}
          script_stop: false
          script: |
            set +e
            PROJECT_PATH="${{ secrets.COM_PROJECT_PATH }}"

            if [ -z "$PROJECT_PATH" ]; then
              echo "COM_PROJECT_PATH is missing"
              exit 0
            fi

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              echo "Repository is not initialized at $PROJECT_PATH"
              exit 0
            fi

            find_bin() {
              local name="$1"
              shift
              if command -v "$name" >/dev/null 2>&1; then
                command -v "$name"
                return 0
              fi
              local candidate
              for candidate in "$@"; do
                if [ -x "$candidate" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              return 1
            }

            PHP_BIN="$(find_bin php /usr/local/bin/php /usr/bin/php /opt/cpanel/ea-php83/root/usr/bin/php /opt/cpanel/ea-php82/root/usr/bin/php /opt/cpanel/ea-php81/root/usr/bin/php 2>/dev/null || true)"
            COMPOSER_BIN="$(find_bin composer /usr/local/bin/composer /opt/cpanel/composer/bin/composer /usr/bin/composer 2>/dev/null || true)"
            NPM_BIN="$(find_bin npm /usr/local/bin/npm /usr/bin/npm 2>/dev/null || true)"

            echo "PHP_BIN=${PHP_BIN:-not-found}"
            echo "COMPOSER_BIN=${COMPOSER_BIN:-not-found}"
            echo "NPM_BIN=${NPM_BIN:-not-found}"

            git config --global --add safe.directory "$PROJECT_PATH" || true
            cd "$PROJECT_PATH" || exit 0
            git fetch origin main || true
            git reset --hard origin/main || true

            if [ -d "$PROJECT_PATH/com-api" ]; then
              cd "$PROJECT_PATH/com-api" || true

              if [ -n "$COMPOSER_BIN" ] && [ -n "$PHP_BIN" ]; then
                "$PHP_BIN" "$COMPOSER_BIN" install --no-dev --prefer-dist --no-interaction --optimize-autoloader || true
              else
                echo "Composer/PHP not found; skipping composer install"
              fi

              if [ ! -f .env ] && [ -f .env.example ]; then
                cp .env.example .env || true
              fi

              if [ -f .env ]; then
                grep -q '^APP_NAME=' .env && sed -i 's/^APP_NAME=.*/APP_NAME=COM/' .env || echo 'APP_NAME=COM' >> .env
                grep -q '^APP_URL=' .env && sed -i 's#^APP_URL=.*#APP_URL=https://com.pm.sa#' .env || echo 'APP_URL=https://com.pm.sa' >> .env
              fi

              mkdir -p routes || true
              printf '%s\n' '<?php' '' 'use Illuminate\Support\Facades\Route;' '' "Route::prefix('v1')->group(function () {" "    Route::get('/health', function () {" '        return response()->json([' "            'ok' => true," "            'app' => 'COM API'," "            'version' => 'v1'," '        ]);' '    });' '});' > routes/api.php || true

              if [ -n "$PHP_BIN" ]; then
                "$PHP_BIN" artisan key:generate --force || true
                "$PHP_BIN" artisan storage:link || true
                "$PHP_BIN" artisan optimize:clear || true
                "$PHP_BIN" artisan config:clear || true
                "$PHP_BIN" artisan route:clear || true
                "$PHP_BIN" artisan view:clear || true

                if grep -q '^DB_DATABASE=' .env 2>/dev/null; then
                  "$PHP_BIN" artisan migrate --force || true
                else
                  echo "Skipping migrations because DB_DATABASE is not configured"
                fi
              else
                echo "PHP not found; skipping artisan commands"
              fi
            else
              echo "com-api is missing. Run Bootstrap COM manually after fixing bootstrap errors."
            fi

            if [ -f "$PROJECT_PATH/com-mobile/package.json" ]; then
              cd "$PROJECT_PATH/com-mobile" || true
              if [ -n "$NPM_BIN" ]; then
                "$NPM_BIN" install || true
              else
                echo "npm not found; skipping mobile dependency install"
              fi
            else
              echo "com-mobile package.json is missing; skipping mobile install"
            fi

            cd "$PROJECT_PATH" || true
            if [ -f scripts/setup-com-domain.sh ]; then
              chmod +x scripts/setup-com-domain.sh || true
              COM_PROJECT_PATH="$PROJECT_PATH" COM_DOMAIN="com.pm.sa" COM_CPANEL_USER="pmsa" bash scripts/setup-com-domain.sh || true
            else
              echo "Domain setup script not found"
            fi

            chown -R pmsa:pmsa "$PROJECT_PATH" || true

            echo "COM deploy finished successfully"
            exit 0
