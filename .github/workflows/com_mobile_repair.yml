name: COM Mobile Repair

on:
  push:
    paths:
      - scripts/fix-com-mobile-titlebar.js
      - .github/workflows/com_mobile_repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Repair COM mobile title bar
        run: node scripts/fix-com-mobile-titlebar.js
      - name: Commit repair
        run: |
          git config user.name github-actions-bot
          git config user.email github-actions-bot@users.noreply.github.com
          git add com-mobile/index.js
          if git diff --cached --quiet; then
            echo No changes
          else
            git commit -m "Repair COM mobile title bar"
            git push
          fi
