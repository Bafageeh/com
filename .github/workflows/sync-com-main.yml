name: Sync COM Main

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'public/api/v1/integrations/ahmed/summary/**'
      - '.github/workflows/sync-com-main.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync server repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COM_SSH_HOST }}
          username: ${{ secrets.COM_SSH_USER }}
          key: ${{ secrets.COM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.COM_SSH_PORT }}
          script: |
            set -e
            PROJECT_PATH="${{ secrets.COM_PROJECT_PATH }}"
            cd "$PROJECT_PATH"
            git fetch origin main
            git reset --hard origin/main
            echo "COM synced to latest main"

            SRC="$PROJECT_PATH/public/api/v1/integrations/ahmed/summary/index.php"
            echo "Source endpoint: $SRC"
            test -f "$SRC"

            for ROOT in \
              "$PROJECT_PATH/public" \
              "$PROJECT_PATH/com-api/public" \
              "/home/pmsa/public_html/com.pm.sa" \
              "/home/pmsa/public_html/com" \
              "/home/pmsa/public_html/apps/com" \
              "/home/pmsa/public_html"; do
              if [ -d "$ROOT" ]; then
                TARGET="$ROOT/api/v1/integrations/ahmed/summary"
                mkdir -p "$TARGET"
                DEST="$TARGET/index.php"
                if [ "$(realpath -m "$SRC")" = "$(realpath -m "$DEST")" ]; then
                  echo "already current $DEST"
                else
                  cp "$SRC" "$DEST"
                  echo "patched $DEST"
                fi
              fi
            done

            echo "searching old endpoint text"
            grep -R "Unable to load COM Ahmed summary" /home/pmsa/public_html "$PROJECT_PATH" 2>/dev/null || true
            echo "done"
