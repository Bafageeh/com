<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#12091f" />
  <title>COM</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#12091f;color:#150b2e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}button,input{font:inherit}.top{position:sticky;top:0;z-index:10;height:56px;margin:0 0 10px;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:900;color:#150b2e}.wrap{padding:10px 10px 140px;max-width:720px;margin:0 auto}.card,.metric,.expense{background:#fbfaff;border:1px solid #ede9fe;border-radius:18px;padding:10px;margin-bottom:8px}.summary{background:#25104a;border:1px solid #8b5cf6;border-radius:18px;padding:12px;margin-bottom:8px}.summary h2{margin:0 0 10px;color:#fff;font-size:18px;text-align:right}.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.box{border-radius:14px;padding:10px;text-align:center}.red{background:#7f1d1d;border:1px solid #fca5a5}.green{background:#14532d;border:1px solid #86efac}.label{color:#ddd6fe;font-size:12px;font-weight:800}.value{color:#fff;font-size:22px;font-weight:900;margin-top:4px}.net{background:#f8fafc;border:1px solid #d8b4fe;border-radius:16px;margin-top:9px;padding:10px}.row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ede9fe;min-height:35px;font-weight:900}.row:last-child{border-bottom:0;background:#ede9fe;border-radius:12px;margin-top:5px;padding:0 10px;color:#4c1d95}.fixed{background:#f3e8ff;border-color:#c084fc}.income{background:#dcfce7;border-color:#22c55e}.head{display:flex;gap:8px;align-items:center;margin-bottom:8px}.icon{width:36px;height:36px;border-radius:14px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:19px}.title{font-size:18px;font-weight:900;text-align:right;flex:1}.sub{font-size:12px;color:#7c6f91;font-weight:800;margin-top:3px}.info{display:grid;grid-template-columns:1fr 1fr;gap:6px}.infoItem{background:#f5f3ff;border-radius:12px;padding:8px;min-height:48px}.infoVal{font-weight:900;text-align:right}.infoLab{font-size:11px;color:#7c6f91;font-weight:800;text-align:right;margin-top:2px}.actions{display:flex;gap:8px;margin-top:10px}.btn{border:0;border-radius:16px;padding:12px 14px;font-weight:900;color:#fff;background:#7c3aed;flex:1}.btn.danger{background:#be123c}.bottom{position:fixed;left:14px;right:14px;bottom:14px;background:#211033;border:1px solid #4c1d95;border-radius:30px;padding:7px;display:flex;gap:6px;max-width:720px;margin:auto}.tab{flex:1;border:0;border-radius:24px;background:transparent;color:#a78bfa;padding:8px 4px;font-weight:900}.tab.active{background:#7c3aed;color:white}.fab{position:fixed;left:18px;bottom:86px;width:56px;height:56px;border-radius:50%;border:1px solid #c4b5fd;background:#7c3aed;color:white;font-size:34px;z-index:11}.floatActions{position:fixed;left:16px;right:16px;bottom:90px;display:flex;gap:10px;max-width:720px;margin:auto}.floatActions .btn{border-radius:24px}.muted{color:#c4b5fd;text-align:center;font-weight:900;margin:40px 0}.modal{position:fixed;inset:0;background:rgba(18,9,31,.64);z-index:20;display:none;align-items:flex-end}.modal.show{display:flex}.sheet{background:white;border-radius:30px 30px 0 0;padding:18px;max-height:88vh;width:100%;overflow:auto}.sheet h2{margin:0 0 12px;text-align:right}.field{margin-bottom:10px}.field label{display:block;text-align:right;font-weight:900;color:#5b516e;margin-bottom:5px}.field input,.field select{width:100%;background:#faf7ff;border:1px solid #e9d5ff;border-radius:16px;padding:12px;color:#150b2e;font-weight:800;text-align:right}.sheetActions{display:flex;gap:12px;margin-top:12px}.cancel{width:112px;background:#ede9fe;color:#4c1d95}.loading{color:#c4b5fd;text-align:center;margin-top:40px;font-weight:900}@media(min-width:760px){.wrap{padding-top:12px}.top{max-width:720px;margin-left:auto;margin-right:auto}}
  </style>
</head>
<body>
  <div class="top" id="pageTitle">الملخص</div>
  <main class="wrap" id="app"><div class="loading">جاري التحميل...</div></main>
  <button class="fab" id="hostingFab" style="display:none" onclick="openHosting()">＋</button>
  <div class="floatActions" id="expenseActions" style="display:none"><button class="btn" onclick="openExpense()">＋ مصروف</button><button class="btn" style="background:#4c1d95" onclick="alert('التصنيفات من تطبيق الجوال')">⚙️ تصنيفات</button></div>
  <nav class="bottom"><button class="tab" data-tab="expenses">💳<br/>المصروفات</button><button class="tab" data-tab="hostings">🌐<br/>الاستضافات</button><button class="tab" data-tab="dashboard">📊<br/>الملخص</button></nav>
  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
const API='https://com.pm.sa/api';
let active='dashboard', hostings=[], expenses=[], totals={};
const $=id=>document.getElementById(id);
function n(v){ if(v==null)return 0; const x=parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,'')); return Number.isFinite(x)?x:0; }
function money(v){ return n(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt(v){ const x=n(v); return x.toLocaleString('en-US',{maximumFractionDigits:2}); }
function annualExpense(x){ const c=String(x.billing_cycle||'yearly').toLowerCase(); return (c==='monthly'||c==='شهري')?n(x.amount_sar)*12:n(x.amount_sar); }
function pick(o,ks){ for(const k of ks){ const v=n(o&&o[k]); if(v) return v;} return 0; }
async function api(path,opts={}){ const r=await fetch(API+'/'+path,{headers:{Accept:'application/json','Content-Type':'application/json'},...opts}); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.message||'تعذر تنفيذ الطلب'); return j; }
async function load(){ $('app').innerHTML='<div class="loading">جاري التحميل...</div>'; try{ const [h,e,d]=await Promise.all([api('hostings'),api('expenses'),api('dashboard').catch(()=>({totals:{}}))]); hostings=Array.isArray(h.data)?h.data:[]; expenses=Array.isArray(e.data)?e.data:[]; totals=d.totals||{}; render(); }catch(err){ $('app').innerHTML='<div class="muted">تعذر تحميل البيانات<br>'+err.message+'</div>'; } }
function calc(){ const domain=hostings.reduce((s,x)=>s+pick(x,['domain_renewal_cost_sar','domain_renewal_cost','domain_cost_sar','domain_cost','renewal_cost_sar','domain_renewal_price','domain_price']),0); const hosting=hostings.reduce((s,x)=>s+pick(x,['hosting_cost_sar','hosting_cost','hosting_renewal_cost_sar','hosting_renewal_cost','hosting_price','host_cost_sar','host_cost']),0); const manual=expenses.reduce((s,x)=>s+annualExpense(x),0); const annualExp=manual+domain; const net=hosting-annualExp; return {domain,hosting,annualExp,net,monthly:net/12,person:net/24}; }
function summary(){ const c=calc(); return '<section class="summary"><h2>💜 ملخص المصروفات</h2><div class="grid"><div class="box red"><div class="label">مصروف سنوي</div><div class="value">'+money(c.annualExp)+'</div></div><div class="box green"><div class="label">دخل سنوي</div><div class="value">'+money(c.hosting)+'</div></div></div><div class="net"><div class="row"><span>'+money(c.net)+'</span><span>الصافي السنوي</span></div><div class="row"><span>'+money(c.monthly)+'</span><span>الصافي الشهري</span></div><div class="row"><span>'+money(c.person)+'</span><span>صافي الشخص</span></div></div></section>'; }
function fixedCards(){ const c=calc(); return '<section class="card fixed"><div class="head"><div class="icon">🔒</div><div class="title">تجديد النطاقات<div class="sub">مصروف سنوي ثابت من شاشة الاستضافات</div></div></div><div class="info"><Info></Info><div class="infoItem"><div class="infoVal">سنوي</div><div class="infoLab">طريقة الاحتساب</div></div><div class="infoItem"><div class="infoVal">'+money(c.domain)+'</div><div class="infoLab">التكلفة السنوية</div></div></div></section><section class="card income"><div class="head"><div class="icon">💰</div><div class="title">دخل الاستضافات السنوي<div class="sub">دخل سنوي من شاشة الاستضافات</div></div></div><div class="info"><div class="infoItem"><div class="infoVal">سنوي</div><div class="infoLab">طريقة الاحتساب</div></div><div class="infoItem"><div class="infoVal">'+money(c.hosting)+'</div><div class="infoLab">التكلفة السنوية</div></div></div></section>'; }
function render(){ document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===active)); $('hostingFab').style.display=active==='hostings'?'block':'none'; $('expenseActions').style.display=active==='expenses'?'flex':'none'; $('pageTitle').textContent=active==='expenses'?'المصروفات':active==='hostings'?'الاستضافات':'الملخص'; if(active==='dashboard') return renderDashboard(); if(active==='expenses') return renderExpenses(); renderHostings(); }
function renderDashboard(){ const entries=Object.entries(totals); $('app').innerHTML=summary()+ (entries.length?entries.map(([k,v])=>'<div class="metric"><div class="infoLab">'+k+'</div><div class="infoVal" style="font-size:24px">'+v+'</div></div>').join(''):''); }
function renderExpenses(){ $('app').innerHTML=fixedCards()+(expenses.length?expenses.map(x=>'<section class="expense"><div class="head"><div class="icon">💳</div><div class="title">'+(x.expense_type||'-')+'<div class="sub">'+(x.expense_date||'-')+'</div></div></div><div class="infoItem"><div class="infoLab">التكلفة السنوية</div><div class="infoVal" style="font-size:24px">'+money(annualExpense(x))+'</div></div><div class="actions"><button class="btn" onclick="openExpense('+x.id+')">تعديل ✏️</button><button class="btn danger" onclick="delExpense('+x.id+')">حذف 🗑</button></div></section>').join(''):'<div class="muted">لا توجد مصروفات يدوية</div>'); }
function renderHostings(){ $('app').innerHTML=hostings.length?hostings.map(x=>'<section class="card"><div class="head"><div class="icon">🌐</div><div class="title">'+(x.domain||x.company_name||'-')+'<div class="sub">'+(x.company_name||'استضافة')+'</div></div></div><div class="info"><div class="infoItem"><div class="infoVal">'+fmt(x.current_space_mb)+'</div><div class="infoLab">المساحة MB</div></div><div class="infoItem"><div class="infoVal">'+(x.allowed_space_mb?fmt(x.allowed_space_mb):'-')+'</div><div class="infoLab">المسموح G</div></div><div class="infoItem"><div class="infoVal">'+money(x.domain_renewal_cost_sar)+'</div><div class="infoLab">النطاق</div></div><div class="infoItem"><div class="infoVal">'+money(x.hosting_cost_sar)+'</div><div class="infoLab">الاستضافة</div></div><div class="infoItem"><div class="infoVal">'+money(x.tax_sar)+'</div><div class="infoLab">الضريبة</div></div><div class="infoItem"><div class="infoVal">'+(x.domain_renewal_date||'-')+'</div><div class="infoLab">تجديد الدومين</div></div><div class="infoItem"><div class="infoVal">'+(x.hosting_renewal_date||'-')+'</div><div class="infoLab">تجديد الهوست</div></div></div><div class="actions"><button class="btn" onclick="openHosting('+x.id+')">تعديل ✏️</button><button class="btn danger" onclick="delHosting('+x.id+')">حذف 🗑</button></div></section>').join(''):'<div class="muted">لا توجد بيانات استضافة</div>'; }
function closeModal(){ $('modal').classList.remove('show'); }
function openExpense(id){ const x=expenses.find(e=>e.id===id)||{}; $('sheet').innerHTML='<h2>'+(id?'✏️ تعديل مصروف':'＋ إضافة مصروف')+'</h2><div class="field"><label>التاريخ</label><input id="edate" value="'+(x.expense_date||new Date().toISOString().slice(0,10))+'"></div><div class="field"><label>نوع المصروف</label><input id="etype" value="'+(x.expense_type||'Hetzner')+'"></div><div class="field"><label>طريقة الاحتساب</label><select id="ecycle"><option value="yearly">سنوي</option><option value="monthly">شهري</option></select></div><div class="field"><label>المبلغ</label><input id="eamount" value="'+(x.amount_sar||'')+'"></div><div class="field"><label>ملاحظات</label><input id="enotes" value="'+(x.notes||'')+'"></div><div class="sheetActions"><button class="btn cancel" onclick="closeModal()">إلغاء</button><button class="btn" onclick="saveExpense('+ (id||'null') +')">حفظ</button></div>'; $('modal').classList.add('show'); $('ecycle').value=x.billing_cycle||'yearly'; }
async function saveExpense(id){ const body={expense_date:edate.value,expense_type:etype.value,amount_sar:eamount.value,billing_cycle:ecycle.value,notes:enotes.value}; await api(id?'expenses/'+id:'expenses',{method:id?'PUT':'POST',body:JSON.stringify(body)}); closeModal(); await load(); active='expenses'; render(); }
async function delExpense(id){ if(confirm('حذف المصروف؟')){ await api('expenses/'+id,{method:'DELETE'}); await load(); active='expenses'; render(); } }
function openHosting(id){ const x=hostings.find(h=>h.id===id)||{}; $('sheet').innerHTML='<h2>'+(id?'✏️ تعديل استضافة':'＋ إضافة استضافة')+'</h2>'+['company_name:اسم الشركة','domain:الدومين','current_space_mb:المساحة الحالية MB','allowed_space_mb:المساحة المسموح بها G','domain_renewal_cost_sar:تكلفة تجديد النطاق','hosting_cost_sar:تكلفة الاستضافة','tax_sar:ضريبة','domain_renewal_date:تجديد الدومين','hosting_renewal_date:تجديد الهوست','notes:ملاحظات'].map(p=>{const [k,l]=p.split(':');return '<div class="field"><label>'+l+'</label><input id="h_'+k+'" value="'+(x[k]||'')+'"></div>'}).join('')+'<div class="sheetActions"><button class="btn cancel" onclick="closeModal()">إلغاء</button><button class="btn" onclick="saveHosting('+(id||'null')+')">حفظ</button></div>'; $('modal').classList.add('show'); }
async function saveHosting(id){ const keys=['company_name','domain','current_space_mb','allowed_space_mb','domain_renewal_cost_sar','hosting_cost_sar','tax_sar','domain_renewal_date','hosting_renewal_date','notes']; const body={}; keys.forEach(k=>body[k]=$('h_'+k).value); body.company_name=body.company_name||body.domain||'بدون اسم'; body.domain=body.domain||body.company_name; await api(id?'hostings/'+id:'hostings',{method:id?'PUT':'POST',body:JSON.stringify(body)}); closeModal(); await load(); active='hostings'; render(); }
async function delHosting(id){ if(confirm('حذف الاستضافة؟')){ await api('hostings/'+id,{method:'DELETE'}); await load(); active='hostings'; render(); } }
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{active=b.dataset.tab;render();}); load();
</script>
</body>
</html>
